server:
  port: 9080

spring:
  profiles:
    active: default # Toggle to 'prod' to use PostgreSQL
  application:
    name: finguard-api

# Swagger & OpenAPI Config
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: alpha
    tags-sorter: alpha

# JWT and Security Settings
application:
  security:
    jwt:
      # HS256 requires a secret key of at least 256 bits (32 bytes), represented as Base64 below
      secret-key: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
      expiration-ms: 86400000 # 24 Hours in Milliseconds

---
# Default Profile - H2 In-Memory DB (For instant out-of-the-box execution)
spring:
  config:
    activate:
      on-profile: default
  datasource:
    url: jdbc:h2:mem:finguarddb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: password
  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: true
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

---
# Production Profile - PostgreSQL DB (For real deployment)
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: jdbc:postgresql://localhost:5432/finguard
    username: postgres
    password: postgrespassword
    driver-class-name: org.postgresql.Driver
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
